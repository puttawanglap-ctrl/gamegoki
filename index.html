<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เกมผจญภัยระบบย่อยอาหาร</title>
    <!-- โหลด Tailwind CSS สำหรับตกแต่ง UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- โหลด React -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- โหลด Babel เพื่อให้เบราว์เซอร์อ่าน JSX ได้ -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- ตั้งค่าฟอนต์ภาษาไทย -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Prompt', sans-serif; }
        .animate-fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, serverTimestamp, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const { useState, useEffect, useRef, useCallback } = React;

        // --- Firebase Configuration ---
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'digestive-game-demo';

        let app, auth, db;
        if (firebaseConfig) {
          try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
          } catch (e) {
            console.error("Firebase init error:", e);
          }
        }

        // --- Game Data & Assets ---
        const ORGANS = [
          { id: 'mouth', name: 'ปาก', color: 'bg-red-100', desc: 'บดเคี้ยวอาหารให้เล็กลง' },
          { id: 'esophagus', name: 'หลอดอาหาร', color: 'bg-orange-100', desc: 'บีบรูดดันอาหารลงสู่กระเพาะ' },
          { id: 'stomach', name: 'กระเพาะอาหาร', color: 'bg-pink-100', desc: 'ย่อยโปรตีนด้วยกรดและน้ำย่อย' },
          { id: 'small_intestine', name: 'ลำไส้เล็ก', color: 'bg-yellow-100', desc: 'ย่อยอาหารทุกชนิดและดูดซึมสารอาหารส่วนใหญ่' },
          { id: 'large_intestine', name: 'ลำไส้ใหญ่', color: 'bg-green-100', desc: 'ดูดซึมน้ำและเกลือแร่ เปลี่ยนกากอาหารเป็นอุจจาระ' }
        ];

        const QUESTIONS = [
          { q: "อวัยวะใดทำหน้าที่ดูดซึมสารอาหารมากที่สุด?", options: ["กระเพาะอาหาร", "ลำไส้เล็ก", "ลำไส้ใหญ่", "ปาก"], ans: 1 },
          { q: "กระเพาะอาหารมีหน้าที่หลักในการย่อยสารอาหารประเภทใด?", options: ["คาร์โบไฮเดรต", "ไขมัน", "วิตามิน", "โปรตีน"], ans: 3 },
          { q: "กากอาหารที่ย่อยไม่ได้จะถูกส่งไปที่ใด?", options: ["ลำไส้เล็ก", "ลำไส้ใหญ่", "ตับ", "หลอดอาหาร"], ans: 1 },
          { q: "การย่อยอาหารเริ่มต้นที่อวัยวะใด?", options: ["หลอดอาหาร", "ปาก", "กระเพาะอาหาร", "ลำไส้เล็ก"], ans: 1 }
        ];

        // --- SVG Components (Realistic Anatomy Style) ---
        const OrganIcon = ({ type, className = "w-20 h-20" }) => {
          const wrapperClass = `relative flex justify-center items-center rounded-2xl shadow-sm border-4 border-white ${className}`;
          switch(type) {
            case 'mouth':
              return (
                <div className={`${wrapperClass} bg-red-50`}>
                  <svg viewBox="0 0 100 100" className="w-full h-full p-2">
                    {/* ริมฝีปาก */}
                    <path d="M 10 50 C 30 20, 70 20, 90 50 C 70 80, 30 80, 10 50 Z" fill="#d47979" />
                    {/* ช่องปากด้านใน */}
                    <path d="M 15 50 C 30 30, 70 30, 85 50 C 70 70, 30 70, 15 50 Z" fill="#4a1515" />
                    {/* ฟันบน */}
                    <path d="M 20 48 C 40 38, 60 38, 80 48 Z" fill="#ffffff" />
                    {/* ฟันล่าง */}
                    <path d="M 25 52 C 40 62, 60 62, 75 52 Z" fill="#ffffff" />
                    {/* ลิ้น */}
                    <path d="M 35 52 C 45 65, 55 65, 65 52 C 55 75, 45 75, 35 52 Z" fill="#e07b7b" />
                  </svg>
                </div>
              );
            case 'esophagus':
              return (
                <div className={`${wrapperClass} bg-orange-50`}>
                  <svg viewBox="0 0 100 100" className="w-full h-full p-2">
                     {/* ท่อหลอดอาหาร */}
                     <path d="M 40 5 C 38 30, 42 60, 40 95 L 60 95 C 58 60, 62 30, 60 5 Z" fill="#d99882" />
                     <path d="M 40 5 C 38 30, 42 60, 40 95" stroke="#a66a56" strokeWidth="2" fill="none" />
                     <path d="M 60 5 C 58 60, 62 30, 60 95" stroke="#a66a56" strokeWidth="2" fill="none" />
                     {/* กล้ามเนื้อวงแหวน (Circular muscles) */}
                     <line x1="39" y1="20" x2="61" y2="20" stroke="#b87b65" strokeWidth="1.5" />
                     <line x1="40" y1="40" x2="60" y2="40" stroke="#b87b65" strokeWidth="1.5" />
                     <line x1="41" y1="60" x2="59" y2="60" stroke="#b87b65" strokeWidth="1.5" />
                     <line x1="40" y1="80" x2="60" y2="80" stroke="#b87b65" strokeWidth="1.5" />
                  </svg>
                </div>
              );
            case 'stomach':
              return (
                <div className={`${wrapperClass} bg-pink-50`}>
                  <svg viewBox="0 0 100 100" className="w-full h-full p-2">
                     {/* รูปทรงกระเพาะอาหาร */}
                     <path d="M 45 10 C 45 15, 35 25, 30 40 C 25 60, 35 85, 60 85 C 80 85, 85 70, 80 55 C 75 35, 60 25, 55 10 L 45 10 Z" fill="#d17b7b" />
                     <path d="M 45 10 C 45 15, 35 25, 30 40 C 25 60, 35 85, 60 85 C 80 85, 85 70, 80 55 C 75 35, 60 25, 55 10 Z" fill="none" stroke="#9e4b4b" strokeWidth="2" />
                     {/* รอยพับผนังกระเพาะ (Rugae) */}
                     <path d="M 38 45 C 45 65, 65 75, 72 65" fill="none" stroke="#b56363" strokeWidth="2" strokeLinecap="round" />
                     <path d="M 34 55 C 45 75, 60 80, 68 72" fill="none" stroke="#b56363" strokeWidth="2" strokeLinecap="round" />
                  </svg>
                </div>
              );
            case 'small_intestine':
              return (
                <div className={`${wrapperClass} bg-yellow-50`}>
                  <svg viewBox="0 0 100 100" className="w-full h-full p-1">
                     {/* พื้นหลังขดลำไส้ */}
                     <rect x="15" y="25" width="70" height="50" rx="20" fill="#e0a39a" />
                     {/* ขดลำไส้เล็ก */}
                     <path d="M 25 35 C 40 15, 60 20, 75 35 C 90 55, 60 75, 50 50 C 40 25, 20 40, 30 60 C 40 80, 70 80, 75 60" fill="none" stroke="#c4776c" strokeWidth="7" strokeLinecap="round" strokeLinejoin="round" />
                     <path d="M 20 50 C 30 70, 50 80, 60 65 C 70 50, 40 30, 35 45 C 30 60, 45 70, 55 55" fill="none" stroke="#ba6559" strokeWidth="5" strokeLinecap="round" strokeLinejoin="round" />
                  </svg>
                </div>
              );
            case 'large_intestine':
              return (
                <div className={`${wrapperClass} bg-green-50`}>
                  <svg viewBox="0 0 100 100" className="w-full h-full p-2">
                     {/* โครงสร้างลำไส้ใหญ่ */}
                     <path d="M 25 85 L 25 35 C 25 15, 75 15, 75 35 L 75 85" fill="none" stroke="#a38b7d" strokeWidth="16" strokeLinecap="round" />
                     <path d="M 25 85 L 25 35 C 25 15, 75 15, 75 35 L 75 85" fill="none" stroke="#755e51" strokeWidth="2" strokeLinecap="round" />
                     {/* รอยหยักลำไส้ (Haustra) */}
                     <path d="M 17 70 L 33 70 M 17 55 L 33 55 M 17 40 L 33 40 M 26 26 L 38 18 M 50 15 L 50 25 M 62 18 L 74 26 M 67 40 L 83 40 M 67 55 L 83 55 M 67 70 L 83 70" stroke="#755e51" strokeWidth="1.5" />
                  </svg>
                </div>
              );
            default:
              return <div className={wrapperClass}>❓</div>;
          }
        };

        // --- Main App Component ---
        function App() {
          const [user, setUser] = useState(null);
          const [gameState, setGameState] = useState('start');
          const [studentData, setStudentData] = useState({ name: '', class: '', number: '' });
          const [score, setScore] = useState(0);
          const [stars, setStars] = useState(0);
          const [currentLevel, setCurrentLevel] = useState(1);
          const [startTime, setStartTime] = useState(null);
          const [firebaseId, setFirebaseId] = useState(null);

          const playSound = useCallback((type) => {
            try {
              const ctx = new (window.AudioContext || window.webkitAudioContext)();
              const osc = ctx.createOscillator();
              const gain = ctx.createGain();
              osc.connect(gain);
              gain.connect(ctx.destination);
              
              if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, ctx.currentTime);
                osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.5);
                osc.start(); osc.stop(ctx.currentTime + 0.5);
              } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.3);
                osc.start(); osc.stop(ctx.currentTime + 0.3);
              }
            } catch(e) { console.log("Audio not supported/allowed yet"); }
          }, []);

          useEffect(() => {
            if (!auth) return;
            const initAuth = async () => {
              try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                  await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                  await signInAnonymously(auth);
                }
              } catch (err) {
                console.error("Auth Error:", err);
              }
            };
            initAuth();
            const unsubscribe = onAuthStateChanged(auth, setUser);
            return () => unsubscribe();
          }, []);

          const saveProgress = async (completed = false) => {
            if (!db || !user || !studentData.name) return;
            const timeSpent = startTime ? Math.floor((Date.now() - startTime) / 1000) : 0;
            
            const data = {
              name: studentData.name,
              className: studentData.class,
              number: studentData.number,
              score,
              stars,
              level: currentLevel,
              completed,
              timeSpent,
              timestamp: serverTimestamp(),
              userId: user.uid
            };

            try {
              const collectionRef = collection(db, 'artifacts', appId, 'public', 'data', 'students_v1');
              if (firebaseId) {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'students_v1', firebaseId), data);
              } else {
                const docRef = await addDoc(collectionRef, data);
                setFirebaseId(docRef.id);
              }
            } catch (e) {
              console.error("Error saving doc: ", e);
            }
          };

          const startGame = (data) => {
            setStudentData(data);
            setGameState('game');
            setStartTime(Date.now());
            setScore(0);
            setStars(0);
            setCurrentLevel(1);
          };

          const handleLevelComplete = (pointsEarned, starsEarned) => {
            playSound('correct');
            setScore(prev => prev + pointsEarned);
            setStars(prev => prev + starsEarned);
            
            if (currentLevel < 5) {
              setCurrentLevel(prev => prev + 1);
              setTimeout(() => saveProgress(), 500);
            } else {
              setGameState('certificate');
              setTimeout(() => saveProgress(true), 500);
            }
          };

          if (gameState === 'start') return <StartScreen setGameState={setGameState} />;
          if (gameState === 'login') return <LoginScreen startGame={startGame} onBack={() => setGameState('start')} />;
          if (gameState === 'admin') return <AdminDashboard onBack={() => setGameState('start')} db={db} user={user} />;
          if (gameState === 'certificate') {
            return (
              <div className="min-h-screen bg-yellow-100 flex flex-col items-center justify-center p-4">
                <div className="bg-white p-8 rounded-3xl shadow-xl text-center max-w-md w-full border-8 border-yellow-400 animate-fade-in">
                  <h1 className="text-4xl font-black text-yellow-600 mb-2">🏆 ยินดีด้วย! 🏆</h1>
                  <p className="text-xl text-gray-700 mb-6">ผู้เชี่ยวชาญระบบย่อยอาหาร</p>
                  
                  <div className="bg-blue-50 p-4 rounded-xl mb-6">
                    <p className="text-2xl font-bold text-blue-800">{studentData.name}</p>
                    <p className="text-gray-600">ชั้น {studentData.class} เลขที่ {studentData.number}</p>
                  </div>

                  <div className="flex justify-center space-x-4 mb-8">
                    <div className="bg-orange-100 p-4 rounded-xl flex flex-col items-center w-24">
                      <span className="text-3xl">⭐</span>
                      <span className="font-bold text-orange-600">{stars} ดาว</span>
                    </div>
                    <div className="bg-green-100 p-4 rounded-xl flex flex-col items-center w-24">
                      <span className="text-3xl">🎯</span>
                      <span className="font-bold text-green-600">{score} แต้ม</span>
                    </div>
                  </div>

                  <button 
                    onClick={() => setGameState('start')}
                    className="w-full py-4 bg-gradient-to-r from-blue-500 to-blue-600 text-white font-bold rounded-2xl shadow-lg hover:scale-105 transition transform text-xl"
                  >
                    เล่นอีกครั้ง
                  </button>
                </div>
              </div>
            );
          }

          return (
            <div className="min-h-screen bg-blue-50 font-sans pb-20">
              <div className="bg-white shadow-sm p-4 sticky top-0 z-50 rounded-b-3xl">
                <div className="max-w-2xl mx-auto flex justify-between items-center">
                  <div>
                    <div className="text-sm text-gray-500">ด่านที่ {currentLevel} / 5</div>
                    <div className="font-bold text-blue-800">
                      {currentLevel === 1 && "จับคู่อวัยวะ"}
                      {currentLevel === 2 && "เรียงลำดับอวัยวะ"}
                      {currentLevel === 3 && "จำลองการย่อยอาหาร"}
                      {currentLevel === 4 && "ตอบคำถาม"}
                      {currentLevel === 5 && "ภารกิจสุดท้าย"}
                    </div>
                  </div>
                  <div className="flex gap-3 text-lg font-bold">
                    <div className="bg-orange-100 text-orange-600 px-3 py-1 rounded-full flex items-center gap-1">
                      ⭐ {stars}
                    </div>
                    <div className="bg-green-100 text-green-600 px-3 py-1 rounded-full flex items-center gap-1">
                      🎯 {score}
                    </div>
                  </div>
                </div>
                <div className="max-w-2xl mx-auto mt-3 h-2 bg-gray-100 rounded-full overflow-hidden">
                  <div 
                    className="h-full bg-gradient-to-r from-blue-400 to-green-400 transition-all duration-500"
                    style={{ width: `${(currentLevel / 5) * 100}%` }}
                  />
                </div>
              </div>

              <div className="max-w-md mx-auto mt-6 p-4">
                {currentLevel === 1 && <Level1 onComplete={handleLevelComplete} playSound={playSound} />}
                {currentLevel === 2 && <Level2 onComplete={handleLevelComplete} playSound={playSound} />}
                {currentLevel === 3 && <Level3 onComplete={handleLevelComplete} playSound={playSound} />}
                {currentLevel === 4 && <Level4 onComplete={handleLevelComplete} playSound={playSound} />}
                {currentLevel === 5 && <Level5 onComplete={handleLevelComplete} playSound={playSound} />}
              </div>
            </div>
          );
        }

        function StartScreen({ setGameState }) {
          const [code, setCode] = useState('');
          const [error, setError] = useState('');

          const handleEnter = () => {
            if (code === '1234') setGameState('login');
            else if (code === 'admin99') setGameState('admin');
            else setError('รหัสผ่านไม่ถูกต้อง (ลอง 1234)');
          };

          return (
            <div className="min-h-screen bg-gradient-to-b from-blue-200 to-green-200 flex flex-col items-center justify-center p-6 relative overflow-hidden">
              <div className="absolute top-10 left-10 opacity-20"><OrganIcon type="stomach" className="w-32 h-32 transform -rotate-12"/></div>
              <div className="absolute bottom-20 right-10 opacity-20"><OrganIcon type="large_intestine" className="w-40 h-40 transform rotate-12"/></div>

              <div className="bg-white/90 backdrop-blur-sm p-8 rounded-3xl shadow-2xl max-w-sm w-full text-center relative z-10 animate-fade-in">
                <h1 className="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-500 to-pink-500 mb-2">ผจญภัย</h1>
                <h2 className="text-3xl font-black text-blue-800 mb-8">ระบบย่อยอาหาร</h2>
                
                <div className="mb-6">
                  <label className="block text-gray-700 font-bold mb-2 text-left">ใส่รหัสผ่านห้องเรียน</label>
                  <input 
                    type="password" value={code}
                    onChange={(e) => {setCode(e.target.value); setError('');}}
                    className="w-full text-center text-2xl p-4 border-4 border-blue-100 rounded-2xl focus:border-blue-400 outline-none transition"
                    placeholder="****" maxLength={10}
                  />
                  {error && <p className="text-red-500 mt-2 text-sm font-bold">{error}</p>}
                </div>

                <button 
                  onClick={handleEnter}
                  className="w-full py-4 bg-gradient-to-r from-green-400 to-green-500 text-white font-black text-xl rounded-2xl shadow-[0_8px_0_rgb(34,197,94)] hover:shadow-[0_4px_0_rgb(34,197,94)] hover:translate-y-1 transition-all"
                >
                  เข้าสู่เกม 🚀
                </button>
              </div>
            </div>
          );
        }

        function LoginScreen({ startGame, onBack }) {
          const [data, setData] = useState({ name: '', class: '', number: '' });

          const onSubmit = (e) => {
            e.preventDefault();
            if (data.name && data.class && data.number) startGame(data);
          };

          return (
            <div className="min-h-screen bg-blue-50 flex flex-col items-center justify-center p-4 animate-fade-in">
              <div className="bg-white p-8 rounded-3xl shadow-lg w-full max-w-sm">
                <button onClick={onBack} className="text-blue-500 mb-4 font-bold flex items-center">⬅️ กลับ</button>
                <h2 className="text-2xl font-bold text-center text-blue-800 mb-6">ข้อมูลนักวิทยาศาสตร์น้อย</h2>
                <form onSubmit={onSubmit} className="space-y-4">
                  <div>
                    <label className="block text-gray-700 mb-1 font-semibold">ชื่อ - นามสกุล</label>
                    <input required type="text" className="w-full p-3 border-2 border-gray-200 rounded-xl focus:border-blue-400 outline-none" 
                      value={data.name} onChange={e => setData({...data, name: e.target.value})} placeholder="ด.ช. ย่อยเก่ง รักเรียน"/>
                  </div>
                  <div className="flex gap-4">
                    <div className="flex-1">
                      <label className="block text-gray-700 mb-1 font-semibold">ชั้นเรียน</label>
                      <select required className="w-full p-3 border-2 border-gray-200 rounded-xl bg-white"
                        value={data.class} onChange={e => setData({...data, class: e.target.value})}>
                        <option value="">เลือก</option>
                        <option value="ป.6/1">ป.6/1</option>
                        <option value="ป.6/2">ป.6/2</option>
                        <option value="ป.6/3">ป.6/3</option>
                      </select>
                    </div>
                    <div className="flex-1">
                      <label className="block text-gray-700 mb-1 font-semibold">เลขที่</label>
                      <input required type="number" min="1" max="50" className="w-full p-3 border-2 border-gray-200 rounded-xl outline-none"
                        value={data.number} onChange={e => setData({...data, number: e.target.value})} placeholder="1"/>
                    </div>
                  </div>
                  <button type="submit" className="w-full mt-6 py-4 bg-blue-500 text-white font-bold rounded-xl shadow-md text-lg">
                    เริ่มลุยเลย!
                  </button>
                </form>
              </div>
            </div>
          );
        }

        function Level1({ onComplete, playSound }) {
          const [selectedName, setSelectedName] = useState(null);
          const [matched, setMatched] = useState([]);
          const [shuffledNames, setShuffledNames] = useState([]);
          const [shuffledOrgans, setShuffledOrgans] = useState([]);

          useEffect(() => {
            setShuffledNames([...ORGANS].sort(() => Math.random() - 0.5));
            setShuffledOrgans([...ORGANS].sort(() => Math.random() - 0.5));
          }, []);

          const handleNameClick = (id) => {
            if (matched.includes(id)) return;
            playSound('correct');
            setSelectedName(id === selectedName ? null : id);
          };

          const handleOrganClick = (id) => {
            if (matched.includes(id)) return;
            if (selectedName) {
              if (selectedName === id) {
                playSound('correct');
                const newMatched = [...matched, id];
                setMatched(newMatched);
                setSelectedName(null);
                if (newMatched.length === ORGANS.length) {
                  setTimeout(() => onComplete(100, 1), 1000);
                }
              } else {
                playSound('wrong');
                setSelectedName(null);
              }
            }
          };

          return (
            <div className="space-y-6 animate-fade-in">
              <div className="bg-white p-4 rounded-2xl shadow-sm text-center">
                <h3 className="text-xl font-bold text-blue-800">จับคู่อวัยวะ 🧠</h3>
                <p className="text-gray-600">แตะชื่อทางซ้าย แล้วแตะรูปทางขวาให้ถูกต้อง</p>
              </div>
              <div className="flex gap-4">
                <div className="flex-1 space-y-3">
                  {shuffledNames.map(organ => {
                    const isMatched = matched.includes(organ.id);
                    const isSelected = selectedName === organ.id;
                    return (
                      <button key={`name-${organ.id}`} onClick={() => handleNameClick(organ.id)} disabled={isMatched}
                        className={`w-full p-4 rounded-2xl text-left font-bold transition-all border-2
                          ${isMatched ? 'bg-gray-100 text-gray-400 border-gray-200' : 
                            isSelected ? 'bg-blue-500 text-white border-blue-600 scale-105 shadow-md' : 
                            'bg-white text-gray-700 border-blue-100 active:scale-95'}`}
                      >
                        {organ.name} {isMatched && '✅'}
                      </button>
                    );
                  })}
                </div>
                <div className="flex-1 space-y-3 flex flex-col items-center">
                  {shuffledOrgans.map(organ => {
                    const isMatched = matched.includes(organ.id);
                    return (
                      <div key={`organ-${organ.id}`} onClick={() => handleOrganClick(organ.id)}
                        className={`transition-all duration-300 ${isMatched ? 'opacity-30 scale-90' : 'cursor-pointer hover:scale-105 active:scale-95'}
                          ${selectedName && !isMatched ? 'ring-4 ring-blue-400 ring-opacity-50 rounded-2xl' : ''}`}
                      >
                        <OrganIcon type={organ.id} className="w-16 h-16 md:w-20 md:h-20" />
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          );
        }

        function Level2({ onComplete, playSound }) {
          const [sequence, setSequence] = useState([]);
          const [available, setAvailable] = useState([...ORGANS].sort(() => Math.random() - 0.5));
          const correctOrder = ['mouth', 'esophagus', 'stomach', 'small_intestine', 'large_intestine'];

          const handleSelect = (organ) => {
            playSound('correct');
            setSequence([...sequence, organ]);
            setAvailable(available.filter(o => o.id !== organ.id));
          };

          const handleRemove = (organ, index) => {
            playSound('wrong');
            const newSeq = [...sequence];
            newSeq.splice(index, 1);
            setSequence(newSeq);
            setAvailable([...available, organ]);
          };

          const checkAnswer = () => {
            const isCorrect = sequence.every((org, idx) => org.id === correctOrder[idx]);
            if (isCorrect) {
              playSound('correct');
              onComplete(150, 1);
            } else {
              playSound('wrong');
              setSequence([]);
              setAvailable([...ORGANS].sort(() => Math.random() - 0.5));
            }
          };

          return (
            <div className="space-y-6 animate-fade-in">
              <div className="bg-white p-4 rounded-2xl shadow-sm text-center">
                <h3 className="text-xl font-bold text-blue-800">เรียงลำดับเส้นทาง 🛤️</h3>
                <p className="text-gray-600">แตะอวัยวะด้านล่างเพื่อเรียงลำดับการเดินทางของอาหาร</p>
              </div>
              <div className="bg-blue-50/50 p-4 rounded-2xl border-2 border-dashed border-blue-200 flex flex-col gap-2 relative">
                <div className="absolute left-1/2 top-4 bottom-4 w-2 bg-blue-200 transform -translate-x-1/2 z-0"></div>
                {[0, 1, 2, 3, 4].map(i => (
                  <div key={i} className="h-20 bg-white rounded-2xl border-2 border-blue-100 flex items-center px-4 relative z-10 shadow-sm">
                    <div className="w-8 h-8 rounded-full bg-blue-100 text-blue-600 font-bold flex items-center justify-center mr-4">{i + 1}</div>
                    {sequence[i] ? (
                      <div className="flex items-center flex-1 cursor-pointer" onClick={() => handleRemove(sequence[i], i)}>
                        <OrganIcon type={sequence[i].id} className="w-12 h-12 mr-4" />
                        <span className="font-bold text-gray-700">{sequence[i].name}</span>
                        <span className="ml-auto text-red-400 text-sm">แตะเพื่อเอาออก</span>
                      </div>
                    ) : <span className="text-gray-400 italic">ว่างเปล่า...</span>}
                  </div>
                ))}
              </div>
              {sequence.length < 5 ? (
                <div className="flex flex-wrap gap-2 justify-center">
                  {available.map(organ => (
                    <button key={organ.id} onClick={() => handleSelect(organ)} className={`p-2 rounded-2xl border-2 border-white shadow-sm flex flex-col items-center w-24 active:scale-95 transition-transform ${organ.color}`}>
                      <OrganIcon type={organ.id} className="w-12 h-12 mb-1" />
                      <span className="text-xs font-bold text-gray-800">{organ.name}</span>
                    </button>
                  ))}
                </div>
              ) : (
                <button onClick={checkAnswer} className="w-full py-4 bg-green-500 text-white font-bold rounded-2xl shadow-lg text-xl animate-bounce">ตรวจสอบความถูกต้อง!</button>
              )}
            </div>
          );
        }

        function Level3({ onComplete, playSound }) {
          const [animating, setAnimating] = useState(false);
          const [currentStep, setCurrentStep] = useState(-1);

          const startSimulation = () => {
            if (animating) return;
            setAnimating(true);
            setCurrentStep(0);
            playSound('correct');
            let step = 0;
            const interval = setInterval(() => {
              step++;
              if (step < ORGANS.length) {
                setCurrentStep(step);
                playSound('correct');
              } else {
                clearInterval(interval);
                setTimeout(() => {
                  setAnimating(false);
                  onComplete(200, 1);
                }, 1500);
              }
            }, 2000);
          };

          return (
            <div className="space-y-4 animate-fade-in flex flex-col items-center">
              <div className="bg-white p-4 rounded-2xl shadow-sm text-center w-full">
                <h3 className="text-xl font-bold text-blue-800">จำลองการย่อยอาหาร 🔍</h3>
                <p className="text-gray-600">กดปุ่มกินอาหารและสังเกตการทำงาน</p>
              </div>
              {!animating && currentStep === -1 && (
                 <button onClick={startSimulation} className="py-3 px-8 bg-orange-500 text-white font-bold rounded-full shadow-lg text-xl hover:bg-orange-600 active:scale-95 transition-all">🍔 กดกินอาหาร!</button>
              )}
              <div className="relative w-full max-w-xs flex flex-col items-center space-y-2 mt-4">
                <div className="absolute top-10 bottom-10 w-4 bg-gray-200 rounded-full z-0"></div>
                {ORGANS.map((organ, idx) => {
                  const isActive = currentStep === idx;
                  const isPassed = currentStep > idx;
                  return (
                    <div key={organ.id} className="relative z-10 w-full">
                      {isActive && <div className="absolute -left-12 top-1/2 transform -translate-y-1/2 text-3xl animate-bounce">🍔</div>}
                      <div className={`flex items-center bg-white p-3 rounded-2xl border-4 transition-all duration-500 ${isActive ? 'border-orange-500 scale-110 shadow-xl' : isPassed ? 'border-green-400 opacity-80' : 'border-gray-100'}`}>
                        <OrganIcon type={organ.id} className="w-16 h-16 mr-4" />
                        <div>
                          <h4 className="font-bold text-gray-800">{organ.name}</h4>
                          {isActive && <p className="text-xs text-orange-600 animate-pulse">{organ.desc}</p>}
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        }

        function Level4({ onComplete, playSound }) {
          const [currentQ, setCurrentQ] = useState(0);
          const [score, setScore] = useState(0);
          const [timeLeft, setTimeLeft] = useState(15);
          const [selectedOpt, setSelectedOpt] = useState(null);

          useEffect(() => {
            if (timeLeft > 0 && selectedOpt === null) {
              const timer = setTimeout(() => setTimeLeft(timeLeft - 1), 1000);
              return () => clearTimeout(timer);
            } else if (timeLeft === 0 && selectedOpt === null) {
              handleAnswer(-1);
            }
          }, [timeLeft, selectedOpt]);

          const handleAnswer = (idx) => {
            setSelectedOpt(idx);
            const isCorrect = idx === QUESTIONS[currentQ].ans;
            if (isCorrect) { playSound('correct'); setScore(s => s + 1); } 
            else { playSound('wrong'); }

            setTimeout(() => {
              if (currentQ < QUESTIONS.length - 1) {
                setCurrentQ(q => q + 1);
                setSelectedOpt(null);
                setTimeLeft(15);
              } else {
                onComplete(score * 50 + (isCorrect ? 50 : 0), score >= 3 ? 1 : 0);
              }
            }, 1500);
          };

          const q = QUESTIONS[currentQ];

          return (
            <div className="space-y-6 animate-fade-in">
              <div className="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm">
                <span className="font-bold text-gray-500">ข้อ {currentQ + 1}/{QUESTIONS.length}</span>
                <div className={`font-black text-xl flex items-center justify-center w-12 h-12 rounded-full border-4 ${timeLeft <= 5 ? 'text-red-500 border-red-500 animate-pulse' : 'text-blue-500 border-blue-200'}`}>
                  {timeLeft}
                </div>
              </div>
              <div className="bg-white p-6 rounded-3xl shadow-md border-t-8 border-blue-400">
                <h3 className="text-xl font-bold text-gray-800 mb-6 text-center">{q.q}</h3>
                <div className="space-y-3">
                  {q.options.map((opt, idx) => {
                    let btnClass = "bg-blue-50 text-blue-800 border-2 border-blue-100 hover:bg-blue-100";
                    if (selectedOpt !== null) {
                      if (idx === q.ans) btnClass = "bg-green-500 text-white border-green-600";
                      else if (idx === selectedOpt) btnClass = "bg-red-500 text-white border-red-600";
                      else btnClass = "bg-gray-100 text-gray-400 border-gray-200 opacity-50";
                    }
                    return (
                      <button key={idx} disabled={selectedOpt !== null} onClick={() => handleAnswer(idx)} className={`w-full p-4 rounded-2xl font-bold text-left transition-all ${btnClass}`}>
                        {opt}
                      </button>
                    );
                  })}
                </div>
              </div>
            </div>
          );
        }

        function Level5({ onComplete, playSound }) {
          const [step, setStep] = useState(0);
          const [completed, setCompleted] = useState(false);
          const correctOrder = ['mouth', 'esophagus', 'stomach', 'small_intestine', 'large_intestine'];

          const handleChoice = (id) => {
            if (id === correctOrder[step]) {
              playSound('correct');
              if (step === 4) {
                setCompleted(true);
                setTimeout(() => onComplete(300, 1), 2000);
              } else setStep(s => s + 1);
            } else playSound('wrong');
          };

          return (
            <div className="space-y-6 animate-fade-in text-center">
               <div className="bg-gradient-to-r from-purple-500 to-pink-500 p-6 rounded-3xl shadow-lg text-white">
                <h3 className="text-2xl font-black mb-2">⭐ ภารกิจสุดท้าย ⭐</h3>
                <p className="text-lg opacity-90">พานมกล่องนี้เดินทางผ่านระบบย่อยอาหารให้สมบูรณ์ โดยกดเลือกอวัยวะให้ถูกต้องตามลำดับ!</p>
              </div>
              <div className="bg-white p-6 rounded-3xl shadow-md">
                <div className="flex justify-center mb-6">
                  <div className={`text-6xl transition-transform duration-500 ${completed ? 'scale-150 animate-bounce' : ''}`}>🥛</div>
                </div>
                <div className="flex justify-center gap-2 mb-8">
                  {[0,1,2,3,4].map(i => (
                    <div key={i} className={`w-4 h-4 rounded-full transition-colors duration-300 ${i < step ? 'bg-green-500' : i === step ? 'bg-orange-500 animate-pulse' : 'bg-gray-200'}`} />
                  ))}
                </div>
                {!completed ? (
                  <div>
                    <p className="font-bold text-gray-600 mb-4">ขั้นต่อไปคืออวัยวะใด?</p>
                    <div className="grid grid-cols-2 gap-3">
                      {[...ORGANS].sort(() => Math.random() - 0.5).slice(0, 4).map((org, i, arr) => {
                        let renderOrg = org;
                        if (!arr.find(o => o.id === correctOrder[step]) && i === 0) {
                           renderOrg = ORGANS.find(o => o.id === correctOrder[step]);
                        }
                        return (
                          <button key={renderOrg.id + i} onClick={() => handleChoice(renderOrg.id)} className={`p-3 rounded-2xl font-bold flex flex-col items-center shadow-sm active:scale-95 border-b-4 border-black/10 ${renderOrg.color}`}>
                             <OrganIcon type={renderOrg.id} className="w-10 h-10 mb-2" />
                             {renderOrg.name}
                          </button>
                        )
                      })}
                    </div>
                  </div>
                ) : <div className="text-2xl font-bold text-green-500 animate-bounce">ภารกิจสำเร็จ! ย่อยนมเรียบร้อย! 🎉</div>}
              </div>
            </div>
          );
        }

        function AdminDashboard({ onBack, db, user }) {
          const [students, setStudents] = useState([]);
          const [loading, setLoading] = useState(true);

          useEffect(() => {
            if (!db || !user) {
                setLoading(false);
                return;
            }
            const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'students_v1'));
            const unsubscribe = onSnapshot(q, (snapshot) => {
              const data = [];
              snapshot.forEach((doc) => { data.push({ id: doc.id, ...doc.data() }); });
              data.sort((a, b) => b.score - a.score);
              setStudents(data);
              setLoading(false);
            }, (error) => {
              console.error("Error fetching students:", error);
              setLoading(false);
            });
            return () => unsubscribe();
          }, [db, user]);

          return (
            <div className="min-h-screen bg-gray-50 p-4 md:p-8 animate-fade-in">
              <div className="max-w-6xl mx-auto">
                <div className="flex justify-between items-center mb-8 bg-white p-4 rounded-2xl shadow-sm">
                  <h1 className="text-2xl font-black text-gray-800 flex items-center gap-2">📊 ระบบจัดการคุณครู</h1>
                  <button onClick={onBack} className="px-4 py-2 bg-gray-200 text-gray-700 font-bold rounded-lg hover:bg-gray-300 transition">ออกจากระบบ</button>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
                  <div className="bg-blue-500 text-white p-6 rounded-2xl shadow-md">
                     <div className="text-sm opacity-80">นักเรียนทั้งหมด</div>
                     <div className="text-4xl font-black">{students.length}</div>
                  </div>
                  <div className="bg-green-500 text-white p-6 rounded-2xl shadow-md">
                     <div className="text-sm opacity-80">เล่นจบแล้ว</div>
                     <div className="text-4xl font-black">{students.filter(s => s.completed).length}</div>
                  </div>
                </div>
                <div className="bg-white rounded-2xl shadow-md overflow-hidden">
                  <div className="p-4 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
                    <h2 className="font-bold text-gray-700">รายชื่อนักเรียนและคะแนน</h2>
                  </div>
                  <div className="overflow-x-auto">
                    <table className="w-full text-left border-collapse">
                      <thead>
                        <tr className="bg-gray-50 text-gray-500 text-sm border-b">
                          <th className="p-4 font-semibold">อันดับ</th>
                          <th className="p-4 font-semibold">ชื่อ - นามสกุล</th>
                          <th className="p-4 font-semibold">ชั้นเรียน</th>
                          <th className="p-4 font-semibold">ด่านล่าสุด</th>
                          <th className="p-4 font-semibold">ดาว</th>
                          <th className="p-4 font-semibold">คะแนน</th>
                          <th className="p-4 font-semibold">สถานะ</th>
                        </tr>
                      </thead>
                      <tbody>
                        {loading ? (
                          <tr><td colSpan="7" className="p-8 text-center text-gray-500">กำลังโหลดข้อมูล... หรือไม่ได้ต่อฐานข้อมูล</td></tr>
                        ) : students.length === 0 ? (
                          <tr><td colSpan="7" className="p-8 text-center text-gray-500">ยังไม่มีข้อมูลนักเรียน</td></tr>
                        ) : (
                          students.map((student, idx) => (
                            <tr key={student.id} className="border-b hover:bg-gray-50 transition">
                              <td className="p-4">{idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : idx + 1}</td>
                              <td className="p-4 font-bold text-gray-800">{student.name}</td>
                              <td className="p-4 text-gray-600">{student.className} เลขที่ {student.number}</td>
                              <td className="p-4">ด่าน {student.level}</td>
                              <td className="p-4 text-orange-500 font-bold">⭐ {student.stars}</td>
                              <td className="p-4 text-green-600 font-bold">{student.score}</td>
                              <td className="p-4">
                                {student.completed ? 
                                  <span className="px-3 py-1 bg-green-100 text-green-700 rounded-full text-xs font-bold">จบเกม</span> : 
                                  <span className="px-3 py-1 bg-yellow-100 text-yellow-700 rounded-full text-xs font-bold">กำลังเล่น</span>
                                }
                              </td>
                            </tr>
                          ))
                        )}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            </div>
          );
        }

        // --- Render Application ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
